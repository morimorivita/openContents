<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もりもり ガイドブック</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --miku-teal: #39C5BB;
      --miku-light: #7FE7D6;
      --miku-warm: #FFC778;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.22);
      --shadow: rgba(57, 197, 187, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans JP", sans-serif;
      min-height: 100vh;
      background: #a8e0db url("../images/header.png") center / cover no-repeat;
      overflow: hidden;
    }

    .card {
      position: absolute;
      width: calc(100% - 32px);
      max-width: 600px;
      background: var(--glass-bg);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1.5px solid var(--glass-border);
      border-radius: 20px;
      box-shadow:
        0 8px 32px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      overflow: hidden;
      animation: fadeUp 0.6s cubic-bezier(.22, 1, .36, 1) both;
      user-select: none;
    }

    .card.dragging {
      box-shadow:
        0 20px 60px rgba(57, 197, 187, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      transition: box-shadow 0.15s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      background: linear-gradient(135deg, var(--miku-teal) 0%, var(--miku-light) 55%, var(--miku-warm) 100%);
      padding: 22px 28px 18px;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    .card-header:active {
      cursor: grabbing;
    }

    .drag-hint {
      position: absolute;
      top: 10px;
      right: 14px;
      display: flex;
      gap: 3px;
      opacity: 0.45;
    }

    .drag-hint span {
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 6px 0 #fff, 0 12px 0 #fff;
    }

    .card-header::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    .card-header h1 {
      font-size: clamp(1.1rem, 4.5vw, 1.55rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
      line-height: 1.3;
    }

    .card-header .subtitle {
      font-size: clamp(0.7rem, 2.8vw, 0.82rem);
      color: rgba(255, 255, 255, 0.82);
      margin-top: 4px;
      letter-spacing: 0.08em;
    }

    .card-body {
      padding: 20px 24px 24px;
    }

    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-list li {
      animation: fadeUp 0.6s cubic-bezier(.22, 1, .36, 1) both;
    }

    .menu-list li:nth-child(1) { animation-delay: 0.10s; }
    .menu-list li:nth-child(2) { animation-delay: 0.18s; }

    .book-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.10);
      border: 1.5px solid rgba(57, 197, 187, 0.25);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(57, 197, 187, 0.08);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    
    .book-item:hover {
      background: rgba(57, 197, 187, 0.05);
      border-color: var(--miku-teal);
      transform: translateY(-2px);
      box-shadow: 0 4px 18px rgba(57, 197, 187, 0.22);
    }

    .book-title {
      flex: 1;
      color: #c8faf7;
      font-weight: 700;
      font-size: clamp(0.82rem, 3.2vw, 0.97rem);
      text-shadow: 0 0 6px rgba(57, 197, 187, 0.8);
      line-height: 1.35;
    }

    .link-group {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .badge-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 32px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: #fff;
      transition: filter 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .badge-link:hover {
      filter: brightness(1.15);
      transform: scale(1.05);
    }

    .badge-md {
      background: linear-gradient(135deg, #374151, #111827);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .badge-html {
      background: linear-gradient(135deg, #FFC778, #ff9f43);
      box-shadow: 0 2px 6px rgba(255, 159, 67, 0.3);
    }

    .back-btn-container {
      margin-top: 24px;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(.22, 1, .36, 1) both;
      animation-delay: 0.3s;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .card-footer {
      padding: 10px 24px 18px;
      text-align: right;
      font-size: 0.7rem;
      color: rgba(30, 80, 77, 0.55);
      letter-spacing: 0.06em;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="card-header">
      <div class="drag-hint"><span></span><span></span></div>
      <h1>ドキュメント & ガイドブック</h1>
      <p class="subtitle">もりもり gitPages</p>
    </div>

    <div class="card-body">
      <ul class="menu-list">

        <li>
          <div class="book-item">
            <span class="book-title">【nginx】導入・インストール・活用ガイドブック</span>
            <div class="link-group">
              <a href="nginx_guide.md" class="badge-link badge-md">MD</a>
              <a href="nginx_guide.html" class="badge-link badge-html">HTML</a>
            </div>
          </div>
        </li>

        <li>
          <div class="book-item">
            <span class="book-title">Node.js serve パッケージ導入・インストール・活用ガイドブック</span>
            <div class="link-group">
              <a href="serve_guide.md" class="badge-link badge-md">MD</a>
              <a href="serve_guide.html" class="badge-link badge-html">HTML</a>
            </div>
          </div>
        </li>

      </ul>

      <div class="back-btn-container">
        <a href="../index.html" class="back-btn">‹ トップメニューへ戻る</a>
      </div>
    </div>

    <div class="card-footer">© もりもり</div>

  </div>

  <script>
    const card = document.querySelector('.card');
    const handle = document.querySelector('.card-header');

    function centerCard() {
      const x = (window.innerWidth - card.offsetWidth) / 2;
      const y = (window.innerHeight - card.offsetHeight) / 2;
      card.style.left = Math.max(0, x) + 'px';
      card.style.top = Math.max(0, y) + 'px';
    }
    centerCard();

    let dragging = false, startX, startY, origLeft, origTop;

    function onStart(cx, cy) {
      dragging = true; startX = cx; startY = cy;
      origLeft = parseInt(card.style.left) || 0;
      origTop = parseInt(card.style.top) || 0;
      card.classList.add('dragging');
    }
    function onMove(cx, cy) {
      if (!dragging) return;
      const dx = cx - startX, dy = cy - startY;
      card.style.left = Math.max(0, Math.min(window.innerWidth - card.offsetWidth, origLeft + dx)) + 'px';
      card.style.top = Math.max(0, Math.min(window.innerHeight - card.offsetHeight, origTop + dy)) + 'px';
    }
    function onEnd() { dragging = false; card.classList.remove('dragging'); }

    handle.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', () => onEnd());

    handle.addEventListener('touchstart', e => { const t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: true });
    document.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); } }, { passive: false });
    document.addEventListener('touchend', () => onEnd());

    window.addEventListener('resize', () => {
      const l = parseInt(card.style.left) || 0;
      const t = parseInt(card.style.top) || 0;
      card.style.left = Math.min(l, window.innerWidth - card.offsetWidth) + 'px';
      card.style.top = Math.min(t, window.innerHeight - card.offsetHeight) + 'px';
    });
  </script>
</body>

</html>
